<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MK英语必背听写清单</title>
<style>
:root{--ink:#17201d;--muted:#65716b;--paper:#fffdf8;--bg:#f4efe4;--teal:#0e7c7b;--teal-dark:#075e5e;--gold:#d99b18;--coral:#c8553d;--green:#2d936c;--line:#ddd4c4;--soft:#ecf8f6;--warn:#fff3d4;--bad:#fff0ec;--shadow:0 10px 28px rgba(58,45,29,.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:linear-gradient(135deg,#f4efe4 0%,#eef8f5 55%,#fff3d4 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;padding:12px}
button,input,select{font:inherit}button{cursor:pointer}.screen{display:none;max-width:560px;margin:0 auto}.screen.active{display:block}
.panel,.card,.stat{background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.panel{padding:18px}.btn{min-height:46px;border:0;border-radius:8px;padding:10px 14px;font-weight:850;display:flex;align-items:center;justify-content:center;gap:8px}.btn:active{transform:translateY(1px)}.btn-primary{background:var(--teal);color:#fff}.btn-secondary{background:#e5eee9;color:var(--teal-dark)}.btn-gold{background:var(--gold);color:#2b2109}.btn-coral{background:var(--coral);color:#fff}.btn-full{width:100%}
.top{height:7px;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--gold),var(--coral));margin-bottom:12px}.hero{background:#183631;color:#fff;border-radius:8px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}.hero h1{font-size:1.65rem;line-height:1.18}.hero p{color:#dce8e4;margin-top:6px;font-size:.9rem}.tag{display:inline-block;background:var(--gold);color:#231b07;font-size:.72rem;font-weight:900;padding:4px 8px;border-radius:4px;margin-bottom:10px}.hero-num{position:absolute;right:12px;bottom:-16px;font-size:5.8rem;line-height:1;font-weight:950;color:rgba(255,255,255,.08)}
.login{padding-top:34px}.login h1{font-size:1.7rem;margin-bottom:6px}.login p,.hint,.sub{color:var(--muted);font-size:.78rem;line-height:1.45}.login-input,.field select{width:100%;min-height:44px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:9px 10px;font-weight:750}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 12px}.chip{border:1px solid var(--line);background:#fff;color:var(--teal-dark);border-radius:8px;padding:8px 11px;font-weight:800}
.bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.name{font-weight:900}.text-btn{border:0;background:transparent;color:var(--teal-dark);font-weight:850;padding:8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.stat{padding:11px 8px;text-align:center;box-shadow:none}.stat strong{display:block;font-size:1.35rem}.stat span{display:block;color:var(--muted);font-size:.68rem;margin-top:2px}.stat:nth-child(1){border-top:4px solid var(--gold)}.stat:nth-child(2){border-top:4px solid var(--green)}.stat:nth-child(3){border-top:4px solid var(--coral)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label,.setting label{display:block;color:var(--muted);font-size:.7rem;font-weight:850;margin-bottom:4px}.settings{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.setting{background:#f7f3ea;border:1px solid var(--line);border-radius:8px;padding:8px}.setting select{width:100%;border:0;background:transparent;font-weight:850;color:var(--ink)}.section-title{font-size:1rem;font-weight:950;margin-bottom:10px}.review-btn{display:none;width:100%;margin-bottom:12px}
.preview-head{display:flex;align-items:end;justify-content:space-between;margin:16px 0 8px}.preview{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-height:480px;overflow:auto}.card{padding:16px 10px;text-align:center;box-shadow:none;min-height:128px;display:flex;flex-direction:column;justify-content:center}.num{font-size:.7rem;color:#9a9284}.en{font-size:1.45rem;font-weight:950;line-height:1.2;overflow-wrap:anywhere;margin:7px 0}.cn{font-size:1.05rem;color:var(--muted);line-height:1.38;overflow-wrap:anywhere}
.run-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.badge{background:var(--soft);color:var(--teal-dark);border-radius:6px;padding:5px 9px;font-size:.78rem;font-weight:900}.progress{height:9px;background:#e4ddd0;border-radius:6px;overflow:hidden;margin-bottom:12px}.fill{height:100%;background:var(--teal);width:0;transition:width .2s}.stage{min-height:360px;padding:26px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.prompt{font-size:2.35rem;line-height:1.18;font-weight:950;overflow-wrap:anywhere;max-width:100%;margin:20px 0 12px}.timer{width:68px;height:68px;border-radius:50%;border:7px solid #e4ddd0;border-top-color:var(--gold);display:grid;place-items:center;font-size:1.22rem;font-weight:950;margin-top:18px}.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.controls .btn{font-size:.82rem;padding:8px;min-height:42px}
.check-summary{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px;margin-bottom:12px}.check-summary>div{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center}.check-summary strong{display:block;font-size:1.3rem}.check-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0 14px}.check-item{position:relative;background:#fff;border:2px solid var(--line);border-radius:8px;padding:13px 8px;text-align:center;min-height:130px}.check-item.wrong{border-color:var(--coral);background:var(--bad)}.mark{position:absolute;right:6px;top:6px;width:24px;height:24px;border-radius:5px;border:2px solid #c9c0b1;background:#fff;font-weight:950}.wrong .mark{background:var(--coral);color:#fff;border-color:var(--coral)}.answer{font-size:1.42rem;font-weight:950;color:var(--teal-dark);line-height:1.28;overflow-wrap:anywhere;margin-top:7px}
.score{text-align:center;font-size:4.2rem;font-weight:950;color:var(--teal-dark);line-height:1;margin:12px 0}.result-title{text-align:center;font-size:1.2rem;font-weight:950}.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.result-stats div{border-radius:8px;padding:11px;text-align:center;font-weight:900}.good{background:#e5f6ed;color:#176244}.bad{background:var(--bad);color:#9f3522}.list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}.empty{text-align:center;color:var(--muted);padding:24px 8px}.hidden{display:none!important}
@media(max-width:390px){body{padding:8px}.panel{padding:15px}.hero h1{font-size:1.45rem}.settings{grid-template-columns:1fr}.controls{grid-template-columns:1fr 1fr}.preview,.check-grid,.list{grid-template-columns:1fr}.prompt{font-size:1.85rem}.en{font-size:1.26rem}.cn{font-size:1rem}.answer{font-size:1.28rem}}
</style>
</head>
<body>
<div class="top"></div>
<main id="login" class="screen active login">
  <h1>MK英语必背听写清单</h1>
  <p>拼写、变形、固定搭配和句型块清单。</p>
  <section class="panel" style="margin-top:18px">
    <div id="existing" class="hidden"><div class="hint">本设备已有账号</div><div id="chips" class="chips"></div></div>
    <label class="section-title" for="login-id">输入名字或学号</label>
    <input id="login-id" class="login-input" placeholder="例如：Bella" maxlength="20">
    <p class="hint" style="margin:8px 0 14px">记录只保存在当前设备，不会覆盖旧 KET 页面。</p>
    <button class="btn btn-primary btn-full" onclick="login()">进入</button>
  </section>
</main>
<main id="home" class="screen">
  <div class="bar"><div><div id="who" class="name">Hi</div><div id="sub" class="sub">看中文提示，听英文朗读，写英文。</div></div><button class="text-btn" onclick="openScreen('login')">切换</button></div>
  <section class="hero"><span class="tag">MK ENGLISH</span><h1>MK英语必背听写清单</h1><p>看中文提示，听英文朗读，写英文。 每组 20-30 个，适合每天打一组。</p><div class="hero-num">MK</div></section>
  <div class="stats"><button class="stat" onclick="openScreen('home')"><strong id="streak">0</strong><span>坚持天数</span></button><button class="stat" onclick="openScreen('mastered')"><strong id="mastered-count">0</strong><span>已掌握</span></button><button class="stat" onclick="openScreen('errors')"><strong id="error-count">0</strong><span>错题本</span></button></div>
  <button id="review" class="btn btn-coral review-btn" onclick="startReview()">复习错题</button>
  <section class="panel">
    <h2 class="section-title">选择今日打卡</h2>
    <div class="grid2"><div class="field"><label for="unit">分组</label><select id="unit" onchange="renderHome()"></select></div><div class="field"><label for="order">顺序</label><select id="order"><option value="order">按顺序</option><option value="random">随机</option></select></div></div>
    <div class="settings"><div class="setting"><label for="seconds">每题时间</label><select id="seconds"><option value="8">8秒</option><option value="12" selected>12秒</option><option value="15">15秒</option></select></div><div class="setting"><label for="repeat">朗读次数</label><select id="repeat"><option value="0">不朗读</option><option value="1">1次</option><option value="2" selected>2次</option></select></div><div class="setting"><label for="rate">速度</label><select id="rate"><option value="0.85">正常</option><option value="0.7" selected>稍慢</option><option value="0.58">较慢</option></select></div></div>
    <button class="btn btn-primary btn-full" onclick="startUnit()">开始本组</button>
    <p id="summary" class="hint" style="text-align:center;margin-top:9px"></p>
  </section>
  <div class="preview-head"><h2 class="section-title" style="margin:0">本组预习</h2><span class="sub">题目＋答案</span></div>
  <div id="preview" class="preview"></div>
</main>
<main id="run" class="screen">
  <div class="run-top"><span id="run-unit" class="badge">Unit</span><span id="run-label" class="sub">1 / 24</span></div>
  <div class="progress"><div id="run-fill" class="fill"></div></div>
  <section class="panel stage"><div id="run-num" class="num">第1题</div><div id="prompt" class="prompt">Ready</div><div id="hint" class="hint">看中文提示，听英文朗读，写英文。</div><div id="timer" class="timer">12</div></section>
  <div class="controls"><button id="pause" class="btn btn-secondary" onclick="togglePause()">暂停</button><button class="btn btn-secondary" onclick="replay()">重听</button><button class="btn btn-primary" onclick="next()">下一题</button><button class="btn btn-coral" onclick="stopRun()">结束</button></div>
</main>
<main id="check" class="screen">
  <div class="bar"><div><div class="name">核对答案</div><div class="sub">点错题打叉，再提交</div></div></div>
  <div class="check-summary"><div><strong id="score-now">100分</strong><span class="sub">成绩</span></div><div><strong id="ok-now">0</strong><span class="sub">正确</span></div><div><strong id="bad-now">0</strong><span class="sub">错误</span></div></div>
  <div id="check-grid" class="check-grid"></div>
  <button class="btn btn-primary btn-full" onclick="submitCheck()">提交结果</button>
</main>
<main id="result" class="screen">
  <section class="panel"><div class="result-title">本轮完成</div><div id="final-score" class="score">100</div><div class="result-stats"><div id="final-ok" class="good">正确 0</div><div id="final-bad" class="bad">错误 0</div></div><div id="wrong-list" class="list"></div><button id="review-now" class="btn btn-coral btn-full hidden" onclick="startReview()">马上复习错题</button><div style="height:8px"></div><button class="btn btn-primary btn-full" onclick="openScreen('home')">返回主页</button></section>
</main>
<main id="mastered" class="screen"><div class="bar"><div><div class="name">已掌握</div><div id="mastered-sub" class="sub"></div></div><button class="text-btn" onclick="openScreen('home')">返回</button></div><div id="mastered-list" class="list"></div></main>
<main id="errors" class="screen"><div class="bar"><div><div class="name">错题本</div><div id="errors-sub" class="sub"></div></div><button class="text-btn" onclick="openScreen('home')">返回</button></div><div id="errors-list" class="list"></div><button id="review2" class="btn btn-coral btn-full" onclick="startReview()">复习错题</button></main>
<script>
const DATA=[{"name":"必背 01 名词复数所有格","words":[{"w":"boxes","cn":"盒子的复数","say":"box","hint":"写出英文复数形式。"},{"w":"buses","cn":"公交车的复数","say":"bus","hint":"写出英文复数形式。"},{"w":"peaches","cn":"桃子的复数","say":"peach","hint":"写出英文复数形式。"},{"w":"dishes","cn":"盘子的复数","say":"dish","hint":"写出英文复数形式。"},{"w":"monkeys","cn":"猴子的复数","say":"monkey","hint":"写出英文复数形式。"},{"w":"ladies","cn":"女士的复数","say":"lady","hint":"写出英文复数形式。"},{"w":"children","cn":"孩子的复数","say":"child","hint":"写出英文复数形式。"},{"w":"men","cn":"男人的复数","say":"man","hint":"写出英文复数形式。"},{"w":"women","cn":"女人的复数","say":"woman","hint":"写出英文复数形式。"},{"w":"sheep","cn":"绵羊的复数","say":"sheep","hint":"写出英文复数形式。"},{"w":"feet","cn":"脚的复数","say":"foot","hint":"写出英文复数形式。"},{"w":"teeth","cn":"牙齿的复数","say":"tooth","hint":"写出英文复数形式。"},{"w":"mice","cn":"老鼠的复数","say":"mouse","hint":"写出英文复数形式。"},{"w":"countries","cn":"国家的复数","say":"country","hint":"写出英文复数形式。"},{"w":"cities","cn":"城市的复数","say":"city","hint":"写出英文复数形式。"},{"w":"stories","cn":"故事的复数","say":"story","hint":"写出英文复数形式。"},{"w":"knives","cn":"刀的复数","say":"knife","hint":"写出英文复数形式。"},{"w":"wives","cn":"妻子的复数","say":"wife","hint":"写出英文复数形式。"},{"w":"leaves","cn":"树叶的复数","say":"leaf","hint":"写出英文复数形式。"},{"w":"Children's","cn":"儿童的所有格","say":"children","hint":"写出英文所有格形式。"},{"w":"cups","cn":"杯子的复数","say":"cup","hint":"写出英文复数形式。"},{"w":"books","cn":"书的复数","say":"book","hint":"写出英文复数形式。"},{"w":"tomatoes","cn":"西红柿的复数","say":"tomato","hint":"写出英文复数形式。"},{"w":"potatoes","cn":"土豆的复数","say":"potato","hint":"写出英文复数形式。"}]},{"name":"必背 02 代词限定词","words":[{"w":"I - me - my - mine","cn":"我：主格/宾格/形物代/名物代"},{"w":"he - him - his","cn":"他：主格/宾格/他的"},{"w":"she - her - hers","cn":"她：主格/宾格或形物代/名物代"},{"w":"we - us - our - ours","cn":"我们：主格/宾格/形物代/名物代"},{"w":"they - them - their - theirs","cn":"他们：主格/宾格/形物代/名物代"},{"w":"it - its","cn":"它/它的"},{"w":"myself","cn":"我自己"},{"w":"yourself","cn":"你自己"},{"w":"himself","cn":"他自己"},{"w":"herself","cn":"她自己"},{"w":"ourselves","cn":"我们自己"},{"w":"themselves","cn":"他们自己"},{"w":"another function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(users))}catch(e){}}
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function user(){if(!users[current.id])users[current.id]={name:current.id,streak:0,lastDate:'',mastered:{},errors:{},history:[]};return users[current.id];}
function bumpStreak(u){const t=today();if(u.lastDate===t)return;const y=new Date();y.setDate(y.getDate()-1);const ys=`${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;u.streak=u.lastDate===ys?(u.streak||0)+1:1;u.lastDate=t;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function init(){load();DATA.forEach((u,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${u.name} · ${u.words.length}个`;$('unit').appendChild(o);});const ids=Object.keys(users);$('existing').classList.toggle('hidden',!ids.length);$('chips').innerHTML=ids.map(id=>`<button class="chip" onclick="quick('${id}')">${esc(users[id].name||id)}</button>`).join('');$('login-id').addEventListener('keydown',e=>{if(e.key==='Enter')login();});renderPreview(0);}
function login(){const id=$('login-id').value.trim();if(!id)return;current={id};user();save();openScreen('home');}
function quick(id){current={id};openScreen('home');}
function renderHome(){if(!current)return;const u=user();$('who').textContent=`Hi，${u.name||current.id}`;$('streak').textContent=u.streak||0;$('mastered-count').textContent=Object.values(u.mastered).filter(x=>(x.streak||0)>=2).length;const ec=Object.keys(u.errors).length;$('error-count').textContent=ec;$('review').style.display=ec?'flex':'none';$('review').textContent=`复习错题 ${ec} 个`;const n=parseInt($('unit').value||0);$('summary').textContent=`本组 ${DATA[n].words.length} 个 · 每天练一组就够`;renderPreview(n);}
function renderPreview(n){$('preview').innerHTML=DATA[n].words.map((it,i)=>`<div class="card"><div class="num">${i+1}</div><div class="en">${esc(it.w)}</div><div class="cn">${esc(it.cn)}</div></div>`).join('');}
function find(w){for(const u of DATA){const hit=u.words.find(x=>x.w===w);if(hit)return hit;}return {w,cn:''};}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function startUnit(){const unit=DATA[parseInt($('unit').value)];items=$('order').value==='random'?shuffle(unit.words):[...unit.words];start(unit.name);}
function startReview(){const err=Object.keys(user().errors).map(find);if(!err.length)return;items=shuffle(err);start('错题复习');}
function start(label){unlock();idx=0;wrong=new Set();running=true;paused=false;skip=false;$('run-unit').textContent=label;$('pause').textContent='暂停';openScreen('run');run(++token);}
async function run(t){for(idx=0;idx<items.length&&t===token;idx++){skip=false;currentItem=items[idx];renderRun();await speak(speakOf(currentItem));if(t!==token)return;await countdown(parseInt($('seconds').value),t);}if(t===token)startCheck();}
function renderRun(){const prompt=currentItem.cn;$('prompt').textContent=prompt;$('run-num').textContent=`第 ${idx+1} 题`;$('run-label').textContent=`${idx+1} / ${items.length}`;$('run-fill').style.width=`${idx/items.length*100}%`;$('timer').textContent=$('seconds').value;$('hint').textContent=currentItem.hint||($('repeat').value==='0'?'看中文提示，写英文。':'看中文提示，听英文朗读，写英文。');}
async function countdown(sec,t){let left=sec*1000,last=performance.now();while(left>0&&t===token&&!skip){while(paused&&running)await sleep(100);const now=performance.now();left-=now-last;last=now;$('timer').textContent=Math.max(0,Math.ceil(left/1000));await sleep(90);}}
function togglePause(){paused=!paused;$('pause').textContent=paused?'继续':'暂停';if(paused&&speechSynthesis)speechSynthesis.cancel();}
function next(){skip=true;if(speechSynthesis)speechSynthesis.cancel();}
function stopRun(){if(!confirm('结束本轮？'))return;token++;running=false;if(speechSynthesis)speechSynthesis.cancel();openScreen('home');}
function unlock(){try{const u=new SpeechSynthesisUtterance('');speechSynthesis.speak(u);speechSynthesis.cancel();const vs=speechSynthesis.getVoices();voice=vs.find(v=>v.lang&&v.lang.startsWith('en'))||null;}catch(e){}}
function speak(text){return new Promise(resolve=>{try{const r=parseInt($('repeat').value);if(!r){if(speechSynthesis)speechSynthesis.cancel();resolve();return;}text=String(text||'');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text.replaceAll(' - ',', '));u.lang='en-GB';u.rate=parseFloat($('rate').value);if(voice)u.voice=voice;let done=false;const end=()=>{if(done)return;done=true;resolve();};u.onerror=end;let count=0;const say=()=>{if(count>=r){end();return;}count++;speechSynthesis.speak(u);};u.onend=()=>{if(count<r)setTimeout(say,350);else end();};say();setTimeout(end,Math.max(2500,text.length*500*r));}catch(e){resolve();}});}
function speakOf(it){return it.say||it.w;}
function replay(){if(currentItem)speak(speakOf(currentItem));}
function startCheck(){running=false;if(speechSynthesis)speechSynthesis.cancel();$('check-grid').innerHTML=items.map((it,i)=>`<button id="ci-${i}" class="check-item" onclick="toggleWrong(${i})"><span id="mk-${i}" class="mark"></span><div class="num">${i+1}</div><div class="cn">${esc((it.cn))}</div><div class="answer">${esc((it.w))}</div></button>`).join('');updateCheck();openScreen('check');}
function toggleWrong(i){wrong.has(i)?wrong.delete(i):wrong.add(i);$('ci-'+i).classList.toggle('wrong',wrong.has(i));$('mk-'+i).textContent=wrong.has(i)?'×':'';updateCheck();}
function updateCheck(){const bad=wrong.size,ok=items.length-bad,score=Math.round(ok/items.length*100);$('score-now').textContent=score+'分';$('ok-now').textContent=ok;$('bad-now').textContent=bad;}
function submitCheck(){const u=user();bumpStreak(u);items.forEach((it,i)=>{if(wrong.has(i)){const e=u.errors[it.w]||{count:0,passed:0};e.count++;e.passed=0;u.errors[it.w]=e;delete u.mastered[it.w];}else{const m=u.mastered[it.w]||{streak:0};m.streak=(m.streak||0)+1;u.mastered[it.w]=m;if(u.errors[it.w]){u.errors[it.w].passed=(u.errors[it.w].passed||0)+1;if(u.errors[it.w].passed>=2)delete u.errors[it.w];}}});const bad=wrong.size,ok=items.length-bad,score=Math.round(ok/items.length*100);u.history.push({date:today(),score,bad,total:items.length});u.history=u.history.slice(-80);save();$('final-score').textContent=score+'分';$('final-ok').textContent='正确 '+ok;$('final-bad').textContent='错误 '+bad;const badItems=[...wrong].map(i=>items[i]);$('wrong-list').innerHTML=badItems.length?badItems.map(it=>`<div class="card"><div class="en">${esc(it.w)}</div><div class="cn">${esc(it.cn)}</div></div>`).join(''):'<div class="empty">本轮全对。</div>';$('review-now').classList.toggle('hidden',!badItems.length);$('review-now').textContent=`马上复习错题 ${badItems.length} 个`;openScreen('result');}
function renderMastered(){const arr=Object.entries(user().mastered).filter(([,m])=>(m.streak||0)>=2).map(([w])=>find(w));$('mastered-sub').textContent=`共 ${arr.length} 个`;$('mastered-list').innerHTML=arr.length?arr.map(it=>`<div class="card"><div class="en">${esc(it.w)}</div><div class="cn">${esc(it.cn)}</div></div>`).join(''):'<div class="empty">独立答对两次后会出现在这里。</div>';}
function renderErrors(){const arr=Object.entries(user().errors).sort((a,b)=>b[1].count-a[1].count);$('errors-sub').textContent=`共 ${arr.length} 个`;$('review2').classList.toggle('hidden',!arr.length);$('errors-list').innerHTML=arr.length?arr.map(([w,m])=>{const it=find(w);return `<div class="card"><div class="en">${esc(it.w)}</div><div class="cn">${esc(it.cn)}</div><div class="sub">错 ${m.count} 次 · 答对 ${m.passed||0}/2</div></div>`;}).join(''):'<div class="empty">错题本是空的。</div>';}
init();
</script>
</body>
</html>
